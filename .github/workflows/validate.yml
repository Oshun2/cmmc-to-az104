name: Validate mappings

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate CMMC mapping data
        run: python3 scripts/validate.py

      - name: Ensure tracker is committed in sync
        run: |
          git diff --exit-code -- audit/assessment-tracker.csv \
            || { echo "::error::assessment-tracker.csv drifted; run scripts/build_assessment_tracker.py and commit"; exit 1; }
